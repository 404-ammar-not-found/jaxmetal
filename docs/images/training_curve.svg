<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" font-family="-apple-system, Segoe UI, Roboto, sans-serif" role="img" aria-label="MNIST test accuracy per epoch, reaching 98.15 percent">
  <rect x="0" y="0" width="720" height="400" rx="12" fill="#0d1117" stroke="#30363d"/>
  <text x="32" y="42" fill="#e6edf3" font-size="20" font-weight="700">MNIST test accuracy — trained on the GPU</text>
  <text x="32" y="64" fill="#8b949e" font-size="13">784→1024→10 · ReLU · softmax-XE · plain SGD (lr=0.5, batch=512) · all steps on-device</text>

  <!-- gridlines + y ticks (93..98.5, px/%=45.45, y0=320) -->
  <g stroke="#21262d" stroke-width="1">
    <line x1="90" y1="274.6" x2="690" y2="274.6"/>
    <line x1="90" y1="229.1" x2="690" y2="229.1"/>
    <line x1="90" y1="183.6" x2="690" y2="183.6"/>
    <line x1="90" y1="92.7"  x2="690" y2="92.7"/>
  </g>
  <g fill="#8b949e" font-size="12" text-anchor="end">
    <text x="82" y="278">94%</text>
    <text x="82" y="233">95%</text>
    <text x="82" y="187">96%</text>
    <text x="82" y="142">97%</text>
    <text x="82" y="96">98%</text>
  </g>

  <!-- 97% target line -->
  <line x1="90" y1="138.2" x2="690" y2="138.2" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="686" y="132" fill="#3fb950" font-size="11" text-anchor="end">≥97% target</text>

  <!-- accuracy curve -->
  <polyline fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"
    points="90,300.9 115,224.6 140,178.2 165,159.6 190,139.6 215,133.7 240,122.3 265,116.4 290,110.5 315,103.2 340,109.6 365,99.6 390,100.0 415,97.3 440,94.6 465,92.7 490,90.9 515,92.7 540,89.1 565,90.9 590,92.3 615,88.2 640,85.9 665,87.3 690,87.3"/>

  <!-- markers: crossing 97% (epoch 5) and final -->
  <circle cx="215" cy="133.7" r="4" fill="#3fb950" stroke="#0d1117" stroke-width="1.5"/>
  <text x="222" y="128" fill="#3fb950" font-size="11">crosses 97% @ epoch 5</text>
  <circle cx="640" cy="85.9" r="4.5" fill="#58a6ff" stroke="#0d1117" stroke-width="1.5"/>
  <text x="632" y="79" fill="#e6edf3" font-size="13" font-weight="600" text-anchor="end">best 98.15%</text>

  <!-- x axis -->
  <line x1="90" y1="320" x2="690" y2="320" stroke="#484f58" stroke-width="1.5"/>
  <g fill="#8b949e" font-size="12" text-anchor="middle">
    <text x="90" y="340">0</text>
    <text x="215" y="340">5</text>
    <text x="340" y="340">10</text>
    <text x="465" y="340">15</text>
    <text x="590" y="340">20</text>
    <text x="690" y="340">24</text>
    <text x="390" y="366" fill="#6e7681">epoch</text>
  </g>

  <text x="32" y="392" fill="#6e7681" font-size="11">Matches a NumPy/jax.grad golden reference to ~1e-7; within ±0.5% of the same MLP trained on the JAX-CPU backend.</text>
</svg>
